name: Desktop Preview Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub pre-release tag to publish
        required: true
        default: desktop-v0.1.0-preview.2

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build Apple Silicon DMG
    runs-on: macos-14
    steps:
      - name: Check out main
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Validate and package desktop app
        working-directory: desktop
        run: |
          npm run typecheck
          npm test
          npm audit --audit-level=high
          npm run package

      - name: Publish preview DMG
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" desktop/out/Riffrec-darwin-arm64.dmg --clobber
          else
            gh release create "$RELEASE_TAG" desktop/out/Riffrec-darwin-arm64.dmg \
              --target "$GITHUB_SHA" \
              --prerelease \
              --title "Riffrec Desktop v0.1.0 Preview 2" \
              --notes "Apple Silicon macOS preview build. This DMG is unsigned and unnotarized; right-click Riffrec.app and choose Open on first launch."
          fi
